mathematical_logic:
  title: 数理逻辑
  sections:
    - what_is_logic:
        title: 什么是逻辑学
        subsections:
        - thinking_and_language:
          title: 思维与语言
        - classical_logic:
          title: 经典逻辑学
        - mathematical_logic:
          title: 数理逻辑
          content: 数理逻辑的定义、数理逻辑的诞生、直觉主义、形式主义、数理逻辑的研究对象、数理逻辑与经典逻辑的区别
    - formal_language:
        title: 形式语言
        subsections:
        - definition_of_formal_language:
          title: 形式语言的定义
          content: 字母表、字符串、字符串集合、形式语言的定义、形式语言的运算、描述形式语言的方法（枚举式描述、集合描述、生成式描述）
        - grammar_and_hierarchy:
          title: 文法与形式语言层级
          content: 形式文法、推导、语言、Chomsky 层级（0/1/2/3 型）
        - unrestricted_grammar:
          title: 无限制文法
          content: 0 型文法的定义、递归可枚举语言、与图灵机的等价性
        - context_sensitive_grammar:
          title: 上下文有关文法
          content: 1 型文法的定义、上下文有关语言、与线性有界自动机的等价性
        - context_free_grammar:
          title: 上下文无关文法
          content: CFG 的定义、推导、语法树、二义性
        - regular_grammar:
          title: 正则文法
          content: 3 型文法（右线性/左线性）的定义、正则语言、与有穷自动机和正则表达式的等价性
        - formal_system:
          title: 形式系统
          content: 形式语言、公理集、推理规则、形式证明、形式系统的组成
    - propositional_language:
        title: 命题逻辑语言
        subsections:
        - symbols_and_syntax_l_0:
          title: 符号和语法
          content: 初始符号、公式的形成、拓展逻辑连接词
        - semantics_l_0:
          title: 语义
          content: 真值函数与赋值函数、满足关系、语义后承、可满足式、重言式
        - axiom_system_l_0:
          title: 公理系统
          content: 公理模式、MP 规则、形式证明、可证关系、演绎定理、假言三段论、反证律、归谬律、双重否定律
        - natural_deduction_l_0:
          title: 自然演绎系统
          content: 演绎规则、形式证明、与公理系统的等价性
        - sequent_calculus_l_0:
          title: 相继式演算系统
          content: 序列、演绎规则、形式证明、切消定理、与公理系统的等价性、与自然演绎系统的等价性
        - meta_theory_l_0:
          title: 元理论
          content: 一致性、极大一致集、可靠性、林登鲍姆引理、真值引理、完全性、可满足性与一致性的等价性、紧致性与可判定性
    - first_order_language:
        title: 一阶逻辑语言
        subsections:
        - symbols_and_syntax_l_1:
          title: 符号和语法
        - semantics_l_1:
          title: 语义
          content: 结构与赋值、理论与模型、满足关系
        - agreement_and_substitution_l_1:
          title: 合同与代入
        - axiom_system_l_1:
          title: 公理系统
        - zfc_axiom_theory:
          title: ZFC 公理系统
    - recursion_theory:
        title: 递归论
        subsections:
    - first_order_arithmetic:
        title: 一阶算数
        subsections:
    - proof_theory:
        title: 证明论
        subsections:
    - model_theory:
        title: 模型论
        subsections:
    - high_order_language:
        title: 高阶逻辑语言
        subsections:
    - type_theory:
        title: 类型论
        subsections: